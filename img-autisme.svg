<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F4C3A"/>
      <stop offset="100%" style="stop-color:#1B3A5C"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5FAFF"/>
      <stop offset="100%" style="stop-color:#E8F4FD"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A5C;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#122842;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#wall)"/>
  <!-- Floor suggestion -->
  <rect x="0" y="360" width="800" height="140" rx="0" fill="#122842" opacity="0.6"/>
  <!-- Warm light circle top right -->
  <circle cx="650" cy="80" r="160" fill="#F4A829" opacity="0.06"/>
  <!-- Table -->
  <rect x="220" y="290" width="360" height="18" rx="9" fill="#2A5483"/>
  <rect x="260" y="308" width="12" height="60" rx="6" fill="#2A5483"/>
  <rect x="528" y="308" width="12" height="60" rx="6" fill="#2A5483"/>

  <!-- COACH (left) - standing/sitting, navy shirt with GRIP logo -->
  <!-- Body -->
  <rect x="175" y="165" width="110" height="130" rx="20" fill="#1B3A5C"/>
  <!-- GRIP logo on shirt -->
  <rect x="200" y="185" width="60" height="28" rx="6" fill="#F4A829" opacity="0.9"/>
  <text x="230" y="204" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="13" fill="#1B3A5C">GRIP</text>
  <!-- Head coach -->
  <circle cx="230" cy="148" r="32" fill="#C68642"/>
  <!-- Hair coach -->
  <ellipse cx="230" cy="122" rx="32" ry="14" fill="#2C1810"/>
  <rect x="198" y="122" width="64" height="16" rx="8" fill="#2C1810"/>
  <!-- Face details -->
  <circle cx="220" cy="148" r="3.5" fill="#8B5E3C"/>
  <circle cx="240" cy="148" r="3.5" fill="#8B5E3C"/>
  <path d="M 220 160 Q 230 168 240 160" stroke="#8B5E3C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Beard -->
  <path d="M 205 155 Q 230 175 255 155" fill="#2C1810" opacity="0.4"/>
  <!-- Arms coach -->
  <rect x="148" y="175" width="32" height="18" rx="9" fill="#1B3A5C" transform="rotate(15 164 184)"/>
  <rect x="280" y="175" width="32" height="18" rx="9" fill="#1B3A5C" transform="rotate(-20 296 184)"/>
  <!-- Hands -->
  <ellipse cx="148" cy="200" rx="13" ry="10" fill="#C68642"/>
  <ellipse cx="299" cy="190" rx="13" ry="10" fill="#C68642"/>
  <!-- Legs coach -->
  <rect x="188" y="290" width="28" height="70" rx="14" fill="#2A3A5C"/>
  <rect x="244" y="290" width="28" height="70" rx="14" fill="#2A3A5C"/>
  <!-- Shoes -->
  <ellipse cx="202" cy="360" rx="20" ry="9" fill="#1a1a2e"/>
  <ellipse cx="258" cy="360" rx="20" ry="9" fill="#1a1a2e"/>

  <!-- YOUNG PERSON (right) - sitting, casual -->
  <!-- Body -->
  <rect x="490" y="185" width="100" height="110" rx="18" fill="#E8F4FD" opacity="0.85"/>
  <!-- Hoodie detail -->
  <path d="M 490 200 Q 540 195 590 200" stroke="#B8D4E8" stroke-width="2" fill="none"/>
  <!-- Head young person -->
  <circle cx="540" cy="162" r="28" fill="#D4956A"/>
  <!-- Hair -->
  <ellipse cx="540" cy="138" rx="28" ry="12" fill="#3D2314"/>
  <rect x="512" y="138" width="56" height="14" rx="7" fill="#3D2314"/>
  <!-- Face -->
  <circle cx="531" cy="162" r="3" fill="#A0622A"/>
  <circle cx="549" cy="162" r="3" fill="#A0622A"/>
  <path d="M 530 174 Q 540 180 550 174" stroke="#A0622A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Arms young person -->
  <rect x="460" y="200" width="34" height="16" rx="8" fill="#E8F4FD" opacity="0.85" transform="rotate(-10 477 208)"/>
  <rect x="587" y="200" width="34" height="16" rx="8" fill="#E8F4FD" opacity="0.85" transform="rotate(10 604 208)"/>
  <!-- Hands on table -->
  <ellipse cx="468" cy="288" rx="14" ry="9" fill="#D4956A"/>
  <ellipse cx="608" cy="288" rx="14" ry="9" fill="#D4956A"/>
  <!-- Notebook on table -->
  <rect x="430" y="258" width="140" height="35" rx="6" fill="#white" stroke="#B8D4E8" stroke-width="1.5" fill="#fff" opacity="0.9"/>
  <line x1="445" y1="268" x2="555" y2="268" stroke="#D4E6F3" stroke-width="1.5"/>
  <line x1="445" y1="276" x2="540" y2="276" stroke="#D4E6F3" stroke-width="1.5"/>
  <line x1="445" y1="284" x2="550" y2="284" stroke="#D4E6F3" stroke-width="1.5"/>

  <!-- Speech bubble / connection symbol -->
  <circle cx="385" cy="200" r="22" fill="#F4A829" opacity="0.15"/>
  <circle cx="385" cy="200" r="14" fill="#F4A829" opacity="0.25"/>
  <text x="385" y="206" text-anchor="middle" font-size="16">🤝</text>

  <!-- Bottom label -->
  <rect x="0" y="440" width="800" height="60" fill="#0A1A2E" opacity="0.7"/>
  <text x="400" y="468" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="15" fill="#B8D4E8">Persoonlijke begeleiding bij autisme</text>
  <text x="400" y="488" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="12" fill="#F4A829">GRIP Begeleiding · Zoetermeer</text>
</svg>
