<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A1F5C"/>
      <stop offset="100%" style="stop-color:#0A4A6E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>
  <circle cx="150" cy="400" r="200" fill="#1B3A5C" opacity="0.4"/>
  <circle cx="700" cy="100" r="150" fill="#F4A829" opacity="0.05"/>

  <!-- Desk / table -->
  <rect x="150" y="295" width="500" height="16" rx="8" fill="#1B3A5C"/>
  <rect x="190" y="311" width="14" height="55" rx="7" fill="#1B3A5C"/>
  <rect x="596" y="311" width="14" height="55" rx="7" fill="#1B3A5C"/>

  <!-- Laptop on desk -->
  <rect x="340" y="240" width="160" height="58" rx="6" fill="#2A3A5C"/>
  <rect x="344" y="244" width="152" height="50" rx="4" fill="#1a2a44"/>
  <!-- Screen content suggestion -->
  <rect x="350" y="250" width="80" height="6" rx="3" fill="#F4A829" opacity="0.6"/>
  <rect x="350" y="260" width="120" height="4" rx="2" fill="#B8D4E8" opacity="0.4"/>
  <rect x="350" y="268" width="100" height="4" rx="2" fill="#B8D4E8" opacity="0.3"/>
  <rect x="350" y="276" width="110" height="4" rx="2" fill="#B8D4E8" opacity="0.3"/>
  <!-- Laptop hinge -->
  <rect x="320" y="295" width="200" height="8" rx="4" fill="#2A3A5C"/>

  <!-- Papers/agenda -->
  <rect x="175" y="258" width="130" height="40" rx="5" fill="white" opacity="0.9"/>
  <rect x="183" y="265" width="80" height="4" rx="2" fill="#D4E6F3"/>
  <rect x="183" y="273" width="100" height="4" rx="2" fill="#D4E6F3"/>
  <rect x="183" y="281" width="70" height="4" rx="2" fill="#F4A829" opacity="0.5"/>
  <!-- Pen -->
  <rect x="310" y="270" width="5" height="28" rx="2.5" fill="#F4A829" transform="rotate(-20 312 284)"/>

  <!-- COACH (left) - GRIP shirt -->
  <!-- Legs -->
  <rect x="225" y="305" width="26" height="65" rx="13" fill="#1B3A5C"/>
  <rect x="265" y="305" width="26" height="65" rx="13" fill="#1B3A5C"/>
  <ellipse cx="238" cy="370" rx="19" ry="8" fill="#0D1B2E"/>
  <ellipse cx="278" cy="370" rx="19" ry="8" fill="#0D1B2E"/>
  <!-- Body with GRIP logo -->
  <rect x="205" y="175" width="110" height="135" rx="18" fill="#1B3A5C"/>
  <!-- Logo patch -->
  <rect x="228" y="192" width="64" height="30" rx="7" fill="#F4A829"/>
  <text x="260" y="213" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="14" fill="#1B3A5C">GRIP</text>
  <!-- Head -->
  <circle cx="260" cy="152" r="33" fill="#C68642"/>
  <!-- Hair/beard -->
  <ellipse cx="260" cy="124" rx="33" ry="13" fill="#2C1810"/>
  <rect x="227" y="124" width="66" height="16" rx="8" fill="#2C1810"/>
  <path d="M 232 158 Q 260 178 288 158" fill="#2C1810" opacity="0.35"/>
  <!-- Eyes -->
  <circle cx="250" cy="152" r="3.5" fill="#6B3A1F"/>
  <circle cx="270" cy="152" r="3.5" fill="#6B3A1F"/>
  <!-- Smile -->
  <path d="M 250 164 Q 260 172 270 164" stroke="#6B3A1F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Arms -->
  <rect x="172" y="188" width="36" height="16" rx="8" fill="#1B3A5C" transform="rotate(20 190 196)"/>
  <rect x="312" y="188" width="36" height="16" rx="8" fill="#1B3A5C" transform="rotate(-15 330 196)"/>
  <ellipse cx="172" cy="208" rx="13" ry="9" fill="#C68642"/>
  <!-- Pointing at papers -->
  <ellipse cx="314" cy="205" rx="13" ry="9" fill="#C68642"/>

  <!-- YOUNG PERSON (right) -->
  <!-- Legs -->
  <rect x="490" y="305" width="26" height="65" rx="13" fill="#2A5483"/>
  <rect x="530" y="305" width="26" height="65" rx="13" fill="#2A5483"/>
  <ellipse cx="503" cy="370" rx="18" ry="8" fill="#1a2a44"/>
  <ellipse cx="543" cy="370" rx="18" ry="8" fill="#1a2a44"/>
  <!-- Body -->
  <rect x="474" y="190" width="100" height="120" rx="16" fill="#2A5483"/>
  <!-- Hoodie lines -->
  <path d="M 474 215 Q 524 210 574 215" stroke="#3A6A9A" stroke-width="2" fill="none"/>
  <!-- Head -->
  <circle cx="524" cy="167" r="30" fill="#8B5E3C"/>
  <!-- Hair -->
  <ellipse cx="524" cy="141" rx="30" ry="12" fill="#1A0A00"/>
  <rect x="494" y="141" width="60" height="14" rx="7" fill="#1A0A00"/>
  <!-- Face -->
  <circle cx="515" cy="167" r="3" fill="#6B3A1F"/>
  <circle cx="533" cy="167" r="3" fill="#6B3A1F"/>
  <path d="M 514 179 Q 524 185 534 179" stroke="#6B3A1F" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Arms -->
  <rect x="444" y="205" width="34" height="14" rx="7" fill="#2A5483" transform="rotate(-10 461 212)"/>
  <ellipse cx="448" cy="270" rx="13" ry="9" fill="#8B5E3C"/>
  <!-- Hand pointing at screen -->
  <rect x="570" y="205" width="34" height="14" rx="7" fill="#2A5483" transform="rotate(10 587 212)"/>
  <ellipse cx="598" cy="248" rx="13" ry="9" fill="#8B5E3C"/>

  <!-- Connection dots -->
  <circle cx="400" cy="220" r="5" fill="#F4A829" opacity="0.6"/>
  <circle cx="420" cy="220" r="3" fill="#F4A829" opacity="0.4"/>
  <circle cx="380" cy="220" r="3" fill="#F4A829" opacity="0.4"/>

  <!-- Bottom bar -->
  <rect x="0" y="440" width="800" height="60" fill="#0A1228" opacity="0.75"/>
  <text x="400" y="468" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="15" fill="#B8D4E8">Praktische begeleiding bij LVB</text>
  <text x="400" y="488" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="12" fill="#F4A829">GRIP Begeleiding · Zoetermeer</text>
</svg>
